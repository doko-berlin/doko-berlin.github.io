<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doko-Saisonverwaltung</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="text-center bg-gradient-to-br from-emerald-800 to-emerald-950 text-white p-8 rounded-3xl shadow-xl">
            <h1 class="text-3xl font-extrabold">🂡 Doko-Saisonverwaltung 🂱</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-semibold mb-3 border-b pb-2">1. Abend eintragen</h2>
                    <input id="matchDate" type="date" class="w-full border rounded p-2 mb-2">
                    <select id="hostSelect" class="w-full border rounded p-2 mb-2"><option value="">-- Gastgeber --</option></select>
                    <div id="matchPlayersContainer" class="space-y-1 mb-3 text-sm"></div>
                    <button id="saveMatchBtn" onclick="saveMatch()" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold">Abend speichern</button>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-semibold mb-3 border-b pb-2">2. Spieler verwalten</h2>
                    <div class="flex gap-2 mb-3">
                        <input id="newPlayerName" type="text" class="border rounded p-2 flex-grow text-sm">
                        <button onclick="addPlayer()" class="bg-emerald-600 text-white px-4 rounded">+</button>
                    </div>
                    <div id="playerList" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-semibold border-b pb-2 mb-2">3. Saison</h2>
                    <select id="seasonSelect" onchange="changeSeasonView()" class="w-full border p-2 mb-3"></select>
                    <button onclick="createNewSeason()" class="w-full bg-blue-600 text-white py-1 rounded text-sm">Neue Saison anlegen</button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">🏆 Live Tabelle</h2>
                    <table class="w-full text-left text-sm"><thead><tr class="text-gray-500 text-xs uppercase"><th>Platz</th><th>Spieler</th><th>Schnitt</th><th>Punkte</th></tr></thead><tbody id="leaderboardBody"></tbody></table>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">✨ Rekorde</h2>
                    <div id="recordsContainer" class="grid grid-cols-2 gap-4"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">⏳ Abende</h2>
                    <div id="historyContainer" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAR1ZKmXaPgm41yYTdM1hvMoEWajtMRaH4", databaseURL: "https://doko-saisonverwaltung-default-rtdb.europe-west1.firebasedatabase.app", projectId: "doko-saisonverwaltung" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let state = { players: [], seasons: {}, currentSeasonKey: "" };

        db.ref('doko_v2_data').on('value', (s) => {
            const data = s.val() || {};
            state.players = data.players || [];
            state.seasons = data.seasons || {};
            if (!state.currentSeasonKey && Object.keys(state.seasons).length > 0) state.currentSeasonKey = Object.keys(state.seasons).sort().reverse()[0];
            render();
        });

        function saveToCloud() { db.ref('doko_v2_data').set({ players: state.players, seasons: state.seasons }); }

        function render() {
            document.getElementById('playerList').innerHTML = state.players.map(n => `<span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-xs font-bold">${n} <button onclick="removePlayer('${n}')" class="text-red-600">×</button></span>`).join('');
            document.getElementById('seasonSelect').innerHTML = Object.keys(state.seasons).map(k => `<option value="${k}" ${k===state.currentSeasonKey?'selected':''}>${k}</option>`).join('');
            document.getElementById('hostSelect').innerHTML = '<option value="">-- Gastgeber --</option>' + state.players.map(n => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('matchPlayersContainer').innerHTML = state.players.map(n => `<div class="flex items-center gap-2"><input type="checkbox" id="check-${n}"><label>${n}</label><input type="number" id="score-${n}" class="w-16 border rounded p-0.5 text-right"></div>`).join('');
            
            if (state.currentSeasonKey && state.seasons[state.currentSeasonKey].matches) {
                const matches = state.seasons[state.currentSeasonKey].matches;
                document.getElementById('historyContainer').innerHTML = Object.entries(matches).reverse().map(([id, m]) => `<div class="text-xs bg-gray-50 p-2 rounded flex justify-between"><span><b>${m.date}</b> (${m.host})</span><span>${Object.values(m.scores).reduce((a,b)=>a+b,0)} Pkt</span></div>`).join('');
                
                // Einfache Tabellen-Logik
                let stats = {};
                Object.values(matches).forEach(m => Object.entries(m.scores).forEach(([n, s]) => { stats[n] = (stats[n] || 0) + s; }));
                document.getElementById('leaderboardBody').innerHTML = Object.entries(stats).sort((a,b)=>b[1]-a[1]).map((p,i) => `<tr><td class="p-2 font-bold">${i+1}.</td><td class="p-2">${p[0]}</td><td class="p-2">-</td><td class="p-2">${p[1]}</td></tr>`).join('');
            }
        }

        function addPlayer() { const n = document.getElementById('newPlayerName').value; if(n) { state.players.push(n); saveToCloud(); } }
        function removePlayer(n) { state.players = state.players.filter(x => x !== n); saveToCloud(); }
        function changeSeasonView() { state.currentSeasonKey = document.getElementById('seasonSelect').value; render(); }
        function createNewSeason() { const k = "Saison " + new Date().getFullYear(); state.seasons[k] = { matches: {} }; state.currentSeasonKey = k; saveToCloud(); }
        function saveMatch() {
            const date = document.getElementById('matchDate').value;
            const host = document.getElementById('hostSelect').value;
            let scores = {}; state.players.forEach(n => { if(document.getElementById('check-'+n).checked) scores[n] = parseInt(document.getElementById('score-'+n).value)||0; });
            if(!state.seasons[state.currentSeasonKey].matches) state.seasons[state.currentSeasonKey].matches = {};
            state.seasons[state.currentSeasonKey].matches['m_'+Date.now()] = { date, host, scores };
            saveToCloud();
        }
    </script>
</body>
</html>
